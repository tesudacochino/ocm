name: Build executables

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact_name: ocm.exe
            asset_name: ocm.exe
          - os: ubuntu-latest
            artifact_name: ocm
            asset_name: ocm-linux
          - os: macos-latest
            artifact_name: ocm
            asset_name: ocm-mac

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync

      - name: Inject version info
        shell: bash
        run: |
          GIT_HASH=$(git rev-parse --short HEAD)
          echo "Commit hash: $GIT_HASH"
          # Inject version from tag if available
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
            echo "Version from tag: $VERSION"
            sed -i.bak "s/__version__ = \".*\"/__version__ = \"$VERSION\"/" src/opencode_config_manager/_version.py
          fi
          sed -i.bak "s/__commit__ = \"dev\"/__commit__ = \"$GIT_HASH\"/" src/opencode_config_manager/_version.py
          rm -f src/opencode_config_manager/_version.py.bak
          cat src/opencode_config_manager/_version.py

      - name: Build executable
        run: uv run pyinstaller opencode-config-manager.spec

      - name: Rename artifact
        shell: bash
        run: |
          if [ -f "dist/${{ matrix.artifact_name }}" ]; then
            cp "dist/${{ matrix.artifact_name }}" "dist/${{ matrix.asset_name }}"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: dist/${{ matrix.asset_name }}

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
